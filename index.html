    <!-- Custom Styles (Liquid Glass, Animations, Matrix Rain, Pyramid) -->
    <style>
        body { 
            background: #050510; 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden; 
            font-family: 'Barlow', sans-serif; 
        }
        
        /* --- Liquid Glass Utility --- */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        .liquid-glass-strong {
            background: rgba(255, 255, 255, 0.05);
            background-blend-mode: luminosity;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: none;
            box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.15);

            overflow: hidden;
        }
        .liquid-glass-strong::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.6) 100%);

            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* --- Pyramid Loader --- */
        .pyramid-loader { position: relative; width: 300px; height: 300px; display: block; transform-style: preserve-3d; transform: rotateX(-20deg); }
        .wrapper { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotateY(360deg); } }
        .pyramid-loader .wrapper .side { width: 70px; height: 70px; position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: auto; transform-origin: center top; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
        .pyramid-loader .wrapper .side1 { transform: rotateZ(-30deg) rotateY(90deg); background: conic-gradient( #2BDEAC, #F028FD, #D8CCE6, #2F2585); }
        .pyramid-loader .wrapper .side2 { transform: rotateZ(30deg) rotateY(90deg); background: conic-gradient( #2F2585, #D8CCE6, #F028FD, #2BDEAC); }
        .pyramid-loader .wrapper .side3 { transform: rotateX(30deg); background: conic-gradient( #2F2585, #D8CCE6, #F028FD, #2BDEAC); }
        .pyramid-loader .wrapper .side4 { transform: rotateX(-30deg); background: conic-gradient( #2BDEAC, #F028FD, #D8CCE6, #2F2585); }
        .pyramid-loader .wrapper .shadow { width: 60px; height: 60px; background: #8B5AD5; position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: auto; transform: rotateX(90deg) translateZ(-40px); filter: blur(12px); }

        /* --- Matrix Rain Overlay --- */
        .matrix-container { position: absolute; inset: 0; overflow: hidden; opacity: 0.08; z-index: 0; pointer-events: none; mix-blend-mode: screen; }
        .matrix-pattern { position: relative; width: 100vw; height: 100%; display: flex; justify-content: space-around; }
        .matrix-column { position: relative; top: -100%; width: 20px; font-size: 16px; line-height: 18px; font-weight: bold; animation: fall linear infinite; white-space: nowrap; color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        .matrix-column::before { content: "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン123456789"; position: absolute; top: 0; left: 0; writing-mode: vertical-lr; letter-spacing: 2px; }
        @keyframes fall { 0% { transform: translateY(-10%); opacity: 1; } 100% { transform: translateY(200%); opacity: 0; } }

        /* --- Floating Anti-Gravity Effects --- */
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        /* --- Section Cinematic Divider --- */

        /* --- Scroll-reveal base states handled by framer-motion --- */
    </style>

    <!-- React, ReactDOM, Babel & Framer Motion via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        const { motion, useSpring, useScroll, useTransform, AnimatePresence } = window.FramerMotion || window.Motion || {};

        // ==========================================
        // Stacked Panels Interactive Component
        // ==========================================
        const PANEL_COUNT = 22;
        const WAVE_SPRING = { stiffness: 160, damping: 22, mass: 0.6 };
        const SCENE_SPRING = { stiffness: 80, damping: 22, mass: 1 };
        const Z_SPREAD = 42;
        const SIGMA = 2.8;

        const PANEL_IMAGES = [
            "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=80",
            "https://images.unsplash.com/photo-1518020382113-a7e8fc38eac9?w=400&q=80",
            "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&q=80",
            "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&q=80",
            "https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?w=400&q=80",
            "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=400&q=80",
            "https://images.unsplash.com/photo-1518495973542-4542c06a5843?w=400&q=80",
            "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&q=80"
        ];

        const GRADIENT_OVERLAYS = [
            "linear-gradient(135deg, rgba(99,55,255,0.55) 0%, rgba(236,72,153,0.45) 100%)",
            "linear-gradient(135deg, rgba(6,182,212,0.55) 0%, rgba(59,130,246,0.45) 100%)",
            "linear-gradient(135deg, rgba(245,158,11,0.55) 0%, rgba(239,68,68,0.45) 100%)",
            "linear-gradient(135deg, rgba(16,185,129,0.45) 0%, rgba(6,182,212,0.55) 100%)",
        ];

        function Panel({ index, total, waveY, scaleY }) {
            const t = index / (total - 1);
            const baseZ = (index - (total - 1)) * Z_SPREAD;
            const w = 200 + t * 80;
            const h = 280 + t * 120;
            const opacity = 0.25 + t * 0.75;
            const imageUrl = PANEL_IMAGES[index % PANEL_IMAGES.length];
            const gradient = GRADIENT_OVERLAYS[index % GRADIENT_OVERLAYS.length];

            return (
                <motion.div
                    className="absolute rounded-xl pointer-events-none overflow-hidden"
                    style={{
                        width: w,
                        height: h,
                        marginLeft: -w / 2,
                        marginTop: -h / 2,
                        transform: `translateZ(${baseZ}px)`,
                        y: waveY,
                        scaleY,
                        transformOrigin: "bottom center",
                        opacity,
                    }}
                >
                    <div style={{ position: "absolute", inset: 0, backgroundImage: `url(${imageUrl})`, backgroundSize: "cover", backgroundPosition: "center" }} />
                    <div style={{ position: "absolute", inset: 0, background: gradient, mixBlendMode: "multiply" }} />
                    <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.32) 100%)" }} />
                    <div style={{ position: "absolute", inset: 0, borderRadius: "inherit", border: `1px solid rgba(255,255,255,${0.08 + t * 0.22})`, boxSizing: "border-box" }} />
                </motion.div>
            );
        }

        function StackedPanels() {
            const containerRef = useRef(null);
            const isHovering = useRef(false);

            const waveYSprings = Array.from({ length: PANEL_COUNT }, () => useSpring(0, WAVE_SPRING));
            const scaleYSprings = Array.from({ length: PANEL_COUNT }, () => useSpring(1, WAVE_SPRING));
            const rotY = useSpring(15, SCENE_SPRING);
            const rotX = useSpring(5, SCENE_SPRING);

            const handleMouseMove = useCallback((e) => {
                const rect = containerRef.current?.getBoundingClientRect();
                if (!rect) return;
                isHovering.current = true;

                const cx = (e.clientX - rect.left) / rect.width;
                const cy = (e.clientY - rect.top) / rect.height;

                rotY.set(15 + (cx - 0.5) * 24);
                rotX.set(5 + (cy - 0.5) * -15);

                const cursorCardPos = cx * (PANEL_COUNT - 1);

                waveYSprings.forEach((spring, i) => {
                    const dist = Math.abs(i - cursorCardPos);
                    const influence = Math.exp(-(dist * dist) / (2 * SIGMA * SIGMA));
                    spring.set(-influence * 70);
                });

                scaleYSprings.forEach((spring, i) => {
                    const dist = Math.abs(i - cursorCardPos);
                    const influence = Math.exp(-(dist * dist) / (2 * SIGMA * SIGMA));
                    spring.set(0.35 + influence * 0.65);
                });
            }, [rotY, rotX, waveYSprings, scaleYSprings]);

            const handleMouseLeave = useCallback(() => {
                isHovering.current = false;
                rotY.set(15);
                rotX.set(5);
                waveYSprings.forEach(s => s.set(0));
                scaleYSprings.forEach(s => s.set(1));
            }, [rotY, rotX, waveYSprings, scaleYSprings]);

            return (
                <div
                    ref={containerRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    className="relative w-full h-[700px] flex items-center justify-center select-none"
                    style={{ perspective: "1000px" }}
                >
                    <motion.div style={{ rotateY: rotY, rotateX: rotX, transformStyle: "preserve-3d", position: "relative", width: 0, height: 0 }}>
                        {Array.from({ length: PANEL_COUNT }).map((_, i) => (
                            <Panel key={i} index={i} total={PANEL_COUNT} waveY={waveYSprings[i]} scaleY={scaleYSprings[i]} />
                        ))}
                    </motion.div>
                </div>
            );
        }

        // ==========================================
        // Text Decryption Component (Baffle.js)
        // ==========================================
        const DecryptText = ({ text }) => {
            const elRef = useRef(null);
            
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting && elRef.current) {
                        const b = baffle(elRef.current, {
                            characters: '█▓▒░<>//}{[]~^10',
                            speed: 80
                        });
                        b.start();
                        b.reveal(2500);
                        observer.disconnect();
                    }
                }, { threshold: 0.1 });
                
                if (elRef.current) observer.observe(elRef.current);
                return () => observer.disconnect();
            }, []);

            return <span ref={elRef}>{text}</span>;
        }

        // ==========================================
        // Interactive 3D Contact Card
        // ==========================================
        function ContactCard() {
            const cardRef = useRef(null);
            const rotX = useSpring(0, { stiffness: 100, damping: 20 });
            const rotY = useSpring(0, { stiffness: 100, damping: 20 });

            const handleMouseMove = (e) => {
                if (!cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                rotX.set(-(y / rect.height) * 40);
                rotY.set((x / rect.width) * 40);
            };

            const handleMouseLeave = () => {
                rotX.set(0);
                rotY.set(0);
            };

            return (
                <div 
                    ref={cardRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    style={{ perspective: 1200 }}
                    className="w-full max-w-lg mx-auto h-[350px] mt-12 cursor-crosshair z-20 relative"
                >
                    <motion.div 
                        style={{ rotateX: rotX, rotateY: rotY, transformStyle: "preserve-3d" }}
                        className="w-full h-full liquid-glass-strong rounded-[2.5rem] p-10 flex flex-col justify-center items-center text-center relative border border-white/10"
                    >
                        {/* 3D floating inner elements via translateZ */}
                        <div style={{ transform: "translateZ(80px)" }} className="z-10">
                            <h3 className="text-4xl font-heading italic text-white mb-2 tracking-tight pointer-events-none">Initialize Link</h3>
                            <a href="mailto:muhammad.muneeb.nif@gmail.com" className="block text-white/60 hover:text-white transition-colors mb-8 font-inter text-sm uppercase tracking-widest pointer-events-auto">muhammad.muneeb.nif@gmail.com</a>
                        </div>
                        <div style={{ transform: "translateZ(100px)" }} className="flex gap-6 z-20">
                            <a href="#" className="liquid-glass text-white px-8 py-3 rounded-full font-bold hover:bg-white hover:text-black transition-colors shadow-xl shadow-black/50 pointer-events-auto">GitHub</a>
                            <a href="#" className="bg-[#00ff41]/90 text-black px-8 py-3 rounded-full font-bold hover:bg-[#00ff41] hover:scale-105 transition-transform shadow-xl shadow-[#00ff41]/20 pointer-events-auto">LinkedIn</a>
                        </div>
                        {/* Abstract 3D elements inside card */}
                        <div style={{ transform: "translateZ(-40px)" }} className="absolute -top-10 -right-10 w-32 h-32 bg-[#8b5ad5]/30 rounded-full blur-2xl pointer-events-none"></div>
                        <div style={{ transform: "translateZ(20px)" }} className="absolute -bottom-10 -left-10 w-32 h-32 bg-[#00ff41]/20 rounded-full blur-2xl pointer-events-none"></div>
                        <div style={{ transform: "translateZ(40px)" }} className="absolute inset-0 border border-white/5 rounded-[2.5rem] pointer-events-none"></div>
                    </motion.div>
                </div>
            );
        }

        // ==========================================
        // Universal Section Reveal Wrapper
        // ==========================================
        function SectionReveal({ children, direction = 'up', delay = 0, className = '' }) {
            const variants = {
                up:    { hidden: { opacity: 0, y: 70 },  visible: { opacity: 1, y: 0 } },
                down:  { hidden: { opacity: 0, y: -70 }, visible: { opacity: 1, y: 0 } },
                left:  { hidden: { opacity: 0, x: -80 }, visible: { opacity: 1, x: 0 } },
                right: { hidden: { opacity: 0, x: 80 },  visible: { opacity: 1, x: 0 } },
                scale: { hidden: { opacity: 0, scale: 0.88 }, visible: { opacity: 1, scale: 1 } },
                fade:  { hidden: { opacity: 0 },          visible: { opacity: 1 } },
            };
            const chosen = variants[direction] || variants.up;
            return (
                <motion.div
                    className={className}
                    initial="hidden"
                    whileInView="visible"
                    viewport={{ once: true, amount: 0.12 }}
                    transition={{ duration: 0.85, delay, ease: [0.22, 1, 0.36, 1] }}
                    variants={chosen}
                >
                    {children}
                </motion.div>
            );
        }

        // ==========================================
        // Polyglot Hub Interactive Section
        // ==========================================
        function PolyglotHubSection() {
            const containerRef = useRef(null);
            const x = useSpring(0, { stiffness: 100, damping: 30 });
            const y = useSpring(0, { stiffness: 100, damping: 30 });

            const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                x.set((e.clientX - centerX) / rect.width);
                y.set((e.clientY - centerY) / rect.height);
            };

            const handleMouseLeave = () => {
                x.set(0);
                y.set(0);
            };

            const bgX = useTransform(x, [-0.5, 0.5], ["-5%", "5%"]);
            const bgY = useTransform(y, [-0.5, 0.5], ["-5%", "5%"]);
            
            const contentX = useTransform(x, [-0.5, 0.5], [-35, 35]);
            const contentY = useTransform(y, [-0.5, 0.5], [-35, 35]);

            return (
                <section 
                    id="skills" 
                    ref={containerRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    className="py-32 px-8 lg:px-24 relative overflow-hidden bg-transparent"
                    style={{ perspective: 1200 }}
                >
                    <motion.video 
                        autoPlay loop muted playsInline 
                        style={{ x: bgX, y: bgY, scale: 1.15 }}
                        className="absolute inset-0 w-full h-full object-cover z-0 opacity-100 pointer-events-none mix-blend-normal" 
                        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260424_064411_9e9d7f84-9277-41f4-ab10-59172d89e6be.mp4">
                    </motion.video>
                    
                    <motion.div style={{ x: contentX, y: contentY }} className="max-w-7xl mx-auto relative z-10">
                        <div className="mb-24 flex flex-col items-center text-center">
                            <span className="border border-black/20 bg-white/20 rounded-full px-5 py-2 text-xs tracking-widest uppercase text-black mb-8 inline-block shadow-[0_0_15px_rgba(0,0,0,0.1)] backdrop-blur-md font-bold">Polyglot Hub</span>
                            <h2 className="text-6xl md:text-8xl font-heading italic tracking-[-2px] text-black drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] animate-[pulse_3s_ease-in-out_infinite]" style={{ transformStyle: 'preserve-3d', transform: 'translateZ(50px)' }}>Skills & Dimensions.</h2>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                            {/* Tech Orbs */}
                            <div className="flex flex-wrap gap-4 justify-center md:justify-end content-center">
                                {[
                                    { name: "Python (ML)", lvl: "Advanced" },
                                    { name: "Arch Linux", lvl: "Native" },
                                    { name: "BlackArch", lvl: "Exploration" },
                                    { name: "Photoshop", lvl: "Creative" },
                                    { name: "Canva", lvl: "Rapid" }
                                ].map((skill, i) => (
                                    <div key={i} className={`bg-white/20 border border-black/10 backdrop-blur-md rounded-full px-8 py-5 flex flex-col items-center group cursor-crosshair animate-floating ${i%2===0?'delay-1':'delay-3'} shadow-lg shadow-black/5`}>
                                        <span className="font-semibold text-lg text-black">{skill.name}</span>
                                        <div className="h-0 overflow-hidden group-hover:h-auto group-hover:mt-1 opacity-0 group-hover:opacity-100 transition-all duration-300">
                                            <span className="text-xs font-mono text-purple-900 font-bold">LVL: {skill.lvl}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Language Orbs */}
                            <div className="flex flex-wrap gap-4 justify-center md:justify-start content-center">
                                {[
                                    { name: "English", lvl: "Fluent" },
                                    { name: "Urdu", lvl: "Poet" },
                                    { name: "Punjabi", lvl: "Native" },
                                    { name: "Japanese", lvl: "N5/N4" },
                                    { name: "Morse Code", lvl: "Transmitting" },
                                    { name: "Sign Language", lvl: "Learning" }
                                ].map((skill, i) => (
                                    <div key={i} className={`bg-white/20 border border-black/10 backdrop-blur-md rounded-full px-8 py-5 flex flex-col items-center group cursor-crosshair animate-floating ${i%2!==0?'delay-2':'delay-1'} shadow-lg shadow-black/5`}>
                                        <span className="font-semibold text-lg text-black">{skill.name}</span>
                                        <div className="h-0 overflow-hidden group-hover:h-auto group-hover:mt-1 opacity-0 group-hover:opacity-100 transition-all duration-300">
                                            <span className="text-xs font-mono text-purple-900 font-bold">DATA: {skill.lvl}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </motion.div>
                </section>
            );
        }

        // ==========================================
        // Worlds Imagined Interactive Section
        // ==========================================
        function WorldsImaginedSection() {
            const containerRef = useRef(null);
            const x = useSpring(0, { stiffness: 100, damping: 30 });
            const y = useSpring(0, { stiffness: 100, damping: 30 });

            const handleMouseMove = (e) => {
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                x.set((e.clientX - centerX) / rect.width);
                y.set((e.clientY - centerY) / rect.height);
            };

            const handleMouseLeave = () => {
                x.set(0);
                y.set(0);
            };

            const bgX = useTransform(x, [-0.5, 0.5], ["-3%", "3%"]);
